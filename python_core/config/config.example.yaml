tdengine:
  host: "your-tdengine-host"
  port: 6041
  database: "quant_dynamic"
  username: "root"
  password: "your-password"

data:
  stock_list: "stock_list.csv"
  data_source: "zzshare"

fetch:
  retry_times: 3
  retry_delay_base: 5
  history_trading_days: 370
  days_per_batch: 10
  end_date: ""                  # 留空=拉到今天, 填日期=截止

zzshare:
  token: "your-zzshare-token"   # https://quant.zizizaizai.com/me/profile 免费获取
  rate_limit: 60
  freq: "1min"
  collect_sentiment: true

logger:
  level: "INFO"
  file: "data/logs/fetcher.log"
